<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sunbird — Voice. Song. Story.</title>
    <meta name="description" content="sunbird offers voice, songwriting, theory, performance, and poetry-in-song lessons rooted in soul, neo-soul, and folk. Nashville, TN or online." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&family=Cutive+Mono&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply persisted UI prefs before React mounts so we don't flash the
      // default theme/text-size on first paint. Mirrors UiPrefsContext.
      (function () {
        try {
          var t = localStorage.getItem("sunbird:theme");
          document.documentElement.setAttribute(
            "data-theme",
            t === "dark" ? "dark" : "light",
          );
          var s = localStorage.getItem("sunbird:textScale");
          var v = s === "small" ? 0.9 : s === "large" ? 1.15 : 1;
          document.documentElement.style.setProperty("--text-scale", String(v));
        } catch (_) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
