name = "sunbird-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8787

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "sunbird-db"
database_id = "0b13755a-6061-4f94-a548-8d212b00ea33"

