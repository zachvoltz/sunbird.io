name = "sunbird-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[dev]
port = 8787

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "sunbird-db"
database_id = "0b13755a-6061-4f94-a548-8d212b00ea33"

# R2 bucket for library audio (and future media uploads).
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "sunbird-media"
