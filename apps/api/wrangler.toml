name = "sunbird-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[dev]
port = 8787

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "sunbird-db"
database_id = "0b13755a-6061-4f94-a548-8d212b00ea33"

# R2 bucket for library audio (and future media uploads).
# To enable in prod:
#   1) Enable R2 in the Cloudflare dashboard (one-time per account)
#   2) `npx wrangler r2 bucket create sunbird-media`
#   3) Uncomment the binding below + redeploy
# The audio upload endpoint gracefully 501s until the binding is live.
# [[r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "sunbird-media"
