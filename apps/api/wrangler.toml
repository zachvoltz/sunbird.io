name = "sunbird-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Cron-driven upcoming-lesson reminders (24h + 1h). The scheduled handler in
# src/worker.ts is idempotent, so the 15-minute cadence just bounds latency.
[triggers]
crons = ["*/15 * * * *"]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[dev]
port = 8787

[vars]
ENVIRONMENT = "development"
# Square environment selector (non-secret). The Square app id/secret + webhook
# signature key are secrets — set them with `wrangler secret put SQUARE_*`.
SQUARE_ENVIRONMENT = "sandbox"
# Messaging notifications. The public app origin (used to build notification
# links) and the VAPID subject + PUBLIC key are non-secret. The VAPID PRIVATE
# key is a secret: `wrangler secret put VAPID_PRIVATE_KEY`. Generate a pair once
# with `npx web-push generate-vapid-keys` and paste the public key here.
PUBLIC_APP_URL = "http://localhost:5173"
VAPID_SUBJECT = "mailto:noreply@usesunbird.com"
VAPID_PUBLIC_KEY = "BBzf6nncioHc9n59dNzXjTp0-GLpeGz6_w9XM4Sfydyz2neFwgdIswjp4keAG2adNWsK1hM-Yw5QPTYN3-IbRfc"

# Durable Object: one ConversationRoom per coach↔student thread (live WebSocket
# fan-out + presence + the away-notification alarm).
[[durable_objects.bindings]]
name = "CONVERSATION_ROOM"
class_name = "ConversationRoom"

# SQLite-backed DO storage (required on the Workers free plan; fine on paid).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ConversationRoom"]

[[d1_databases]]
binding = "DB"
database_name = "sunbird-db"
database_id = "0b13755a-6061-4f94-a548-8d212b00ea33"

# R2 bucket for library audio (and future media uploads).
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "sunbird-media"

# Cloudflare Email Sending binding (replaces Resend). No API key — the `from`
# domain (usesunbird.com) must be onboarded once with
# `npx wrangler email sending enable usesunbird.com`. For local `wrangler dev`,
# add `remote = true` to proxy sends to the real service.
[[send_email]]
name = "EMAIL"
