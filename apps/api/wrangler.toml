name = "sunbird-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Cron-driven upcoming-lesson reminders (24h + 1h). The scheduled handler in
# src/worker.ts is idempotent, so the 15-minute cadence just bounds latency.
[triggers]
crons = ["*/15 * * * *"]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[dev]
port = 8787

[vars]
ENVIRONMENT = "development"
# Square environment selector (non-secret). The Square app id/secret + webhook
# signature key are secrets — set them with `wrangler secret put SQUARE_*`.
SQUARE_ENVIRONMENT = "sandbox"

[[d1_databases]]
binding = "DB"
database_name = "sunbird-db"
database_id = "0b13755a-6061-4f94-a548-8d212b00ea33"

# R2 bucket for library audio (and future media uploads).
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "sunbird-media"
